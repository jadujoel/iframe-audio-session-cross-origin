<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Audio Session — Iframe</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0.75rem; background: #f7f7fb; }
      h2 { margin-top: 0; }
      .row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.5rem 0; }
      button { padding: 0.4rem 0.8rem; }
      button[aria-pressed="true"] { background: #cde; }
      code { background: #eee; padding: 0 0.25rem; border-radius: 3px; }
      iframe { display: block; margin-top: 0.75rem; border: 2px dashed #88a; border-radius: 8px; background: #fff; }
    </style>
  </head>
  <body>
    <h2>Iframe window</h2>
    <p>Audio Session type: <code id="type">—</code></p>
    <p>AudioContext state: <code id="ctx-state">—</code></p>
    <div class="row" id="type-buttons"></div>
    <div class="row">
      <button type="button" id="tone-toggle">Play tone (660 Hz)</button>
    </div>
    <div id="nested-container"></div>
    <script type="module" src="./iframe.ts"></script>
  </body>
</html>
