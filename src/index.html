<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Audio Session — Parent</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 1rem; }
      h1 { margin-top: 0; }
      .panel { border: 1px solid #999; padding: 1rem; border-radius: 8px; max-width: 720px; }
      .row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.5rem 0; }
      button { padding: 0.4rem 0.8rem; }
      button[aria-pressed="true"] { background: #cde; }
      iframe { display: block; margin-top: 1rem; border: 2px solid #888; border-radius: 8px; }
      code { background: #eee; padding: 0 0.25rem; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Parent window</h1>
      <p>Audio Session type: <code id="type">—</code></p>
      <p>AudioContext state: <code id="ctx-state">—</code></p>
      <div class="row" id="type-buttons"></div>
      <div class="row">
        <button type="button" id="tone-toggle">Play tone (440 Hz)</button>
      </div>
    </div>

    <iframe title="iframe B" allow="autoplay" src="https://jadujoel.github.io/iframe-audio-session/iframe-with-audio.html" width="760" height="480"></iframe>
    <iframe title="iframe B" allow="autoplay;microphone;" src="https://jadujoel.github.io/iframe-audio-session/iframe-with-audio.html" width="760" height="480"></iframe>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
